<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Deforestation Monitor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#030310;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;user-select:none;}
  #app{position:relative;width:100vw;height:100vh;}
  #globe{position:absolute;inset:0;width:100%;height:100%;cursor:grab;}
  #globe:active{cursor:grabbing;}

  /* Title */
  #titleBox{position:absolute;top:16px;left:0;right:0;text-align:center;pointer-events:none;z-index:10;}
  #titleBox .sub{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,0.3);text-transform:uppercase;}
  #yearLabel{font-size:64px;font-weight:900;background:linear-gradient(135deg,#22c55e,#86efac);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}

  /* Side panels */
  .panel{position:absolute;top:50%;transform:translateY(-50%);
    background:rgba(0,0,0,0.55);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px;z-index:10;}
  #leftPanel{left:16px;min-width:150px;}
  #rightPanel{right:16px;}
  .panel-title{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-bottom:14px;}
  .stat{margin-bottom:14px;}
  .stat-label{font-size:10px;color:rgba(255,255,255,0.45);margin-bottom:2px;}
  .stat-value{font-size:28px;font-weight:800;}
  .stat-unit{font-size:10px;color:rgba(255,255,255,0.3);}
  .leg-row{display:flex;align-items:center;gap:9px;font-size:12px;margin-bottom:9px;}
  .leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}

  /* Bottom controls */
  #controls{position:absolute;bottom:0;left:0;right:0;padding:16px 5% 24px;
    background:linear-gradient(transparent,rgba(3,3,16,0.92));z-index:10;}
  .ctrl-row{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  #playBtn{background:rgba(34,197,94,0.15);border:1px solid #22c55e;color:#22c55e;
    padding:7px 18px;border-radius:20px;cursor:pointer;font-size:12px;letter-spacing:1px;
    white-space:nowrap;transition:background .2s;}
  #playBtn:hover{background:rgba(34,197,94,0.28);}
  #slider{flex:1;height:4px;accent-color:#22c55e;cursor:pointer;}
  .tick-row{display:flex;justify-content:space-between;color:rgba(255,255,255,0.25);
    font-size:10px;padding-left:90px;}

  @media(max-width:620px){
    #leftPanel,#rightPanel{display:none;}
    #yearLabel{font-size:44px;}
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="globe"></canvas>

  <!-- Title -->
  <div id="titleBox">
    <div class="sub">Global Deforestation Monitor</div>
    <div id="yearLabel">2000</div>
  </div>

  <!-- Stats -->
  <div class="panel" id="leftPanel">
    <div class="panel-title">FOREST STATS</div>
    <div class="stat">
      <div class="stat-label">Coverage</div>
      <div class="stat-value" id="coverageVal" style="color:#22c55e;">31.6%</div>
    </div>
    <div class="stat">
      <div class="stat-label">Lost Since 2000</div>
      <div class="stat-value" id="lossVal" style="color:#f87171;">0.0</div>
      <div class="stat-unit">million km²</div>
    </div>
    <div class="stat" style="margin-bottom:0;">
      <div class="stat-label">Avg Rate</div>
      <div style="font-size:13px;font-weight:600;color:#fb923c;">~200K km²/yr</div>
    </div>
  </div>

  <!-- Legend -->
  <div class="panel" id="rightPanel">
    <div class="panel-title">LEGEND</div>
    <div class="leg-row"><div class="leg-dot" style="background:#14532d;"></div>Tropical Forest</div>
    <div class="leg-row"><div class="leg-dot" style="background:#22c55e;"></div>Boreal Forest</div>
    <div class="leg-row"><div class="leg-dot" style="background:#86efac;"></div>Temperate Forest</div>
    <div class="leg-row" style="margin-bottom:0;"><div class="leg-dot" style="background:#ef4444;"></div>Deforestation Zone</div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div class="ctrl-row">
      <button id="playBtn">▶ PLAY</button>
      <input type="range" id="slider" min="2000" max="2023" value="2000">
    </div>
    <div class="tick-row">
      <span>2000</span><span>2005</span><span>2010</span><span>2015</span><span>2020</span><span>2023</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── SETUP ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('globe');
const app    = document.getElementById('app');

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(app.clientWidth, app.clientHeight);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, app.clientWidth/app.clientHeight, 0.1, 1000);
camera.position.z = 3.2;

window.addEventListener('resize', () => {
  renderer.setSize(app.clientWidth, app.clientHeight);
  camera.aspect = app.clientWidth / app.clientHeight;
  camera.updateProjectionMatrix();
});

// ─── LIGHTS ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xfff0d8, 1.4);
sun.position.set(5, 3, 5);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x405cff, 0.25);
fill.position.set(-5, -2, -3);
scene.add(fill);

// ─── STARS ───────────────────────────────────────────────────────────────────
(function(){
  const n=7000, pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r=200, t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(p)*Math.cos(t);
    pos[i*3+1]=r*Math.sin(p)*Math.sin(t);
    pos[i*3+2]=r*Math.cos(p);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.45,sizeAttenuation:true})));
})();

// ─── PROCEDURAL EARTH TEXTURE ────────────────────────────────────────────────
function buildEarthCanvas(){
  const W=2048,H=1024;
  const cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // Ocean
  const og=ctx.createLinearGradient(0,0,0,H);
  og.addColorStop(0,'#0a3456'); og.addColorStop(0.5,'#0e5280'); og.addColorStop(1,'#0a3456');
  ctx.fillStyle=og; ctx.fillRect(0,0,W,H);

  function ll(lon,lat){return[((lon+180)/360)*W,((90-lat)/180)*H];}
  function poly(pts,fill){
    ctx.beginPath();
    pts.forEach(([a,b],i)=>{const[x,y]=ll(a,b);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
  }

  const LAND='#7a6545', SNOW='#ddeef8';

  // North America
  poly([[-168,71],[-145,62],[-140,60],[-130,55],[-125,49],[-124,37],[-117,32],[-97,26],
        [-83,30],[-80,25],[-80,38],[-74,45],[-65,47],[-60,47],[-64,44],[-70,44],
        [-76,35],[-75,25],[-85,10],[-78,8],[-82,10],[-84,11],[-88,16],[-90,22],
        [-97,20],[-105,22],[-110,24],[-117,30],[-124,37],[-130,56],[-140,62],[-155,60],[-168,68]],LAND);

  // Greenland
  poly([[-45,84],[-20,85],[-15,82],[-18,77],[-24,74],[-28,70],[-35,68],[-40,65],
        [-45,60],[-52,65],[-52,72],[-48,78]],LAND);
  poly([[-45,82],[-30,84],[-20,83],[-18,77],[-24,73],[-35,68],[-42,66],[-52,72],[-50,78]],SNOW);

  // South America
  poly([[-78,12],[-62,12],[-60,8],[-50,5],[-49,0],[-49,-2],[-35,-5],[-35,-10],
        [-38,-16],[-40,-20],[-44,-23],[-48,-28],[-52,-33],[-58,-38],[-65,-55],
        [-68,-55],[-73,-50],[-75,-30],[-80,-18],[-77,-2],[-78,8]],LAND);

  // Europe
  poly([[-10,36],[0,44],[5,48],[8,54],[15,57],[20,60],[30,65],[28,71],[20,71],
        [15,70],[10,63],[5,55],[2,52],[0,50],[-5,48],[-5,44],[-10,36]],LAND);
  poly([[5,57],[8,57],[12,56],[18,59],[24,65],[28,71],[22,71],[16,70],[14,65],[10,58]],LAND);

  // Africa
  poly([[-18,15],[-16,20],[0,24],[10,24],[20,22],[30,22],[38,22],[42,12],[44,11],
        [43,4],[40,-3],[40,-12],[35,-20],[32,-30],[27,-35],[20,-35],[17,-30],
        [12,-20],[5,-8],[5,5],[2,7],[0,5],[-5,5],[-8,5],[-15,8]],LAND);

  // Eurasia
  poly([[28,38],[35,36],[36,22],[42,12],[45,10],[50,12],[55,22],[65,22],[75,22],
        [80,8],[80,0],[90,-5],[100,0],[100,4],[110,20],[115,22],[120,22],[125,30],
        [130,33],[140,38],[142,48],[148,46],[142,54],[140,60],[126,52],[120,56],
        [90,52],[75,55],[60,60],[54,52],[50,47],[45,41],[40,37],[35,36]],LAND);
  // SE Asia peninsula
  poly([[100,22],[102,20],[100,16],[100,4],[105,5],[108,14],[108,22],[104,22]],LAND);
  // Borneo
  poly([[108,-4],[110,-4],[117,1],[117,4],[116,6],[114,6],[110,4],[108,2]],LAND);
  // Sumatra
  poly([[95,5],[100,3],[104,0],[106,-3],[108,-5],[106,-6],[102,-4],[98,-2],[95,2]],LAND);
  // Java
  poly([[106,-6],[108,-7],[112,-8],[115,-8],[114,-7],[110,-6]],LAND);
  // New Guinea
  poly([[131,-2],[136,-4],[140,-6],[146,-8],[148,-6],[145,-5],[141,-2],[138,-2],[134,-4]],LAND);
  // Japan
  poly([[130,31],[132,34],[135,35],[138,38],[141,42],[141,44],[140,44],[136,36],[131,33]],LAND);

  // Australia
  poly([[114,-22],[116,-30],[118,-34],[124,-34],[130,-34],[136,-35],[140,-37],
        [148,-38],[152,-28],[150,-22],[144,-18],[138,-14],[135,-12],[130,-12],
        [124,-16],[120,-18]],LAND);

  // Antarctica
  ctx.fillStyle=SNOW; ctx.fillRect(0,H*0.865,W,H*0.135);

  // Arctic ice
  ctx.beginPath();
  ctx.ellipse(W*0.5, 0, W*0.36, H*0.09, 0, 0, Math.PI*2);
  ctx.fillStyle=SNOW; ctx.fill();

  return cv;
}

const earthTexture = new THREE.CanvasTexture(buildEarthCanvas());

// Optionally upgrade with a real photo texture if CDN allows it
new THREE.TextureLoader().load(
  'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/textures/planets/earth_atmos_2048.jpg',
  tex => { earthMesh.material.map = tex; earthMesh.material.needsUpdate = true; }
);

// ─── FOREST OVERLAY DATA ──────────────────────────────────────────────────────
const FORESTS = [
  // [centerLon, centerLat, lonRadius, latRadius, deforestRate/yr, color]
  [-62,  -5,  20, 14, 0.006, '#15803d'],  // Amazon
  [-46, -13,   7,  7, 0.014, '#16a34a'],  // Brazilian Cerrado
  [-40, -20,   4, 10, 0.016, '#15803d'],  // Atlantic Forest
  [-84,  12,   5,  6, 0.013, '#16a34a'],  // Central America
  [ 22,   0,  14, 10, 0.004, '#166534'],  // Congo Basin
  [ -6,   6,   8,  4, 0.018, '#15803d'],  // West Africa
  [ 48, -18,   3,  8, 0.010, '#166534'],  // Madagascar
  [114,   0,   9,  8, 0.018, '#14532d'],  // Borneo
  [103,   0,   6,  4, 0.022, '#14532d'],  // Sumatra
  [100,  18,   6,  8, 0.014, '#15803d'],  // Myanmar/Thailand
  [140,  -5,   7,  4, 0.006, '#166534'],  // New Guinea
  [ 78,  12,   5,  5, 0.004, '#15803d'],  // India forests
  [-90,  56,  36, 12, 0.001, '#4ade80'],  // Canadian Boreal
  [-123, 47,   5,  6, 0.003, '#22c55e'],  // Pacific Northwest
  [ 70,  62,  32, 14, 0.001, '#86efac'],  // Siberian Boreal W
  [130,  62,  26, 12, 0.001, '#86efac'],  // Siberian Boreal E
  [ 18,  64,  10,  8, 0.002, '#4ade80'],  // Scandinavia
  [-80,  46,  10,  6, 0.002, '#22c55e'],  // Great Lakes Region
];

// ─── FOREST CANVAS TEXTURE ───────────────────────────────────────────────────
const fCanvas = document.createElement('canvas');
fCanvas.width = 2048; fCanvas.height = 1024;
const fc = fCanvas.getContext('2d');
const forestTexture = new THREE.CanvasTexture(fCanvas);

function drawForests(year) {
  fc.clearRect(0, 0, 2048, 1024);
  const yp = year - 2000;

  function ll(lon,lat){ return [((lon+180)/360)*2048, ((90-lat)/180)*1024]; }

  for(const [lon,lat,lonR,latR,rate,color] of FORESTS){
    const deforest = Math.min(rate * yp, 0.65);
    const scale    = 1 - deforest;
    const [cx,cy]  = ll(lon, lat);
    const rx = (lonR/360)*2048 * scale;
    const ry = (latR/180)*1024 * scale;
    if(rx < 2 || ry < 2) continue;

    // Red deforestation ring (area that was lost)
    if(yp > 0 && deforest > 0.01) {
      const origRx = (lonR/360)*2048;
      const origRy = (latR/180)*1024;
      const rg = fc.createRadialGradient(cx,cy,Math.min(rx,ry)*0.7, cx,cy,Math.max(origRx,origRy)*1.05);
      rg.addColorStop(0,'rgba(239,68,68,0)');
      rg.addColorStop(1,`rgba(239,68,68,${Math.min(deforest*1.6,0.7)})`);
      fc.beginPath();
      fc.ellipse(cx,cy, origRx*1.06, origRy*1.06, 0, 0, Math.PI*2);
      fc.fillStyle = rg;
      fc.fill();
    }

    // Forest body — 3 overlapping ellipses for organic edges
    fc.globalAlpha = 0.93;
    const blobs = [
      [cx,         cy,         rx,      ry,      0   ],
      [cx+rx*0.12, cy+ry*0.09, rx*0.72, ry*0.75, 0.28],
      [cx-rx*0.09, cy-ry*0.12, rx*0.65, ry*0.68,-0.2 ],
    ];
    for(const [ex,ey,erx,ery,rot] of blobs){
      fc.beginPath();
      fc.ellipse(ex,ey,erx,ery,rot,0,Math.PI*2);
      fc.fillStyle = color;
      fc.fill();
    }
    fc.globalAlpha = 1;
  }
}

drawForests(2000);

// ─── GLOBE PIVOT GROUP ────────────────────────────────────────────────────────
const pivot = new THREE.Group();
scene.add(pivot);

const earthMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshPhongMaterial({ map:earthTexture, specular:new THREE.Color(0x0a2844), shininess:14 })
);
pivot.add(earthMesh);

const forestMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1.006, 64, 64),
  new THREE.MeshBasicMaterial({ map:forestTexture, transparent:true, depthWrite:false, alphaTest:0.02 })
);
pivot.add(forestMesh);

// Atmosphere
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.025, 32, 32),
  new THREE.MeshPhongMaterial({color:0x4488ff,transparent:true,opacity:0.06,side:THREE.FrontSide})
));
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.1, 32, 32),
  new THREE.MeshPhongMaterial({color:0x2244aa,transparent:true,opacity:0.04,side:THREE.BackSide})
));

// ─── MOUSE / TOUCH INTERACTION ────────────────────────────────────────────────
let dragging=false, prevMX=0, prevMY=0, velX=0, velY=0;

canvas.addEventListener('mousedown', e=>{
  dragging=true; prevMX=e.clientX; prevMY=e.clientY; velX=velY=0;
});
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  velX=(e.clientY-prevMY)*0.005; velY=(e.clientX-prevMX)*0.005;
  pivot.rotation.x=Math.max(-1.3,Math.min(1.3,pivot.rotation.x+velX));
  pivot.rotation.y+=velY;
  prevMX=e.clientX; prevMY=e.clientY;
});
window.addEventListener('mouseup', ()=>dragging=false);

canvas.addEventListener('touchstart', e=>{
  e.preventDefault(); dragging=true;
  prevMX=e.touches[0].clientX; prevMY=e.touches[0].clientY; velX=velY=0;
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault(); if(!dragging) return;
  velX=(e.touches[0].clientY-prevMY)*0.005; velY=(e.touches[0].clientX-prevMX)*0.005;
  pivot.rotation.x=Math.max(-1.3,Math.min(1.3,pivot.rotation.x+velX));
  pivot.rotation.y+=velY;
  prevMX=e.touches[0].clientX; prevMY=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener('touchend', ()=>dragging=false);

canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  camera.position.z=Math.max(1.8,Math.min(6,camera.position.z+e.deltaY*0.003));
},{passive:false});

// ─── YEAR LOGIC ───────────────────────────────────────────────────────────────
let curYear=2000, playing=false, playTimer=null;
const slider  = document.getElementById('slider');
const playBtn = document.getElementById('playBtn');

function setYear(y){
  curYear = y;
  slider.value = y;
  document.getElementById('yearLabel').textContent = y;
  const yp   = y - 2000;
  const loss  = (yp * 0.20).toFixed(1);
  const cov   = (31.6 - yp * 0.04).toFixed(1);
  document.getElementById('coverageVal').textContent = cov + '%';
  document.getElementById('lossVal').textContent     = loss;
  drawForests(y);
  forestTexture.needsUpdate = true;
}

slider.addEventListener('input', e=>setYear(parseInt(e.target.value)));

playBtn.addEventListener('click', ()=>{
  playing=!playing;
  playBtn.textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
  if(playing){
    if(curYear>=2023) setYear(2000);
    playTimer = setInterval(()=>{
      if(curYear>=2023){ playing=false; clearInterval(playTimer); playBtn.textContent='▶ PLAY'; return; }
      setYear(curYear+1);
    }, 700);
  } else clearInterval(playTimer);
});

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  if(!dragging){
    pivot.rotation.y += 0.0015;
    velX*=0.92; velY*=0.92;
    pivot.rotation.x=Math.max(-1.3,Math.min(1.3,pivot.rotation.x+velX));
    pivot.rotation.y+=velY;
  }
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
